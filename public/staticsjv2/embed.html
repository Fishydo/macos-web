<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Embed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;overflow:hidden;background:#0b0b0b;color:#fff;font-family:Inter,system-ui,sans-serif}#iframe-container{width:100%;height:100%;position:absolute;top:0;left:0}#embed-frame{width:100%;height:100%;border:none;background:transparent}.message{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(10,10,10,.5);backdrop-filter:blur(6px);z-index:5}.content{max-width:420px;padding:18px;text-align:center}.spinner{border:2px solid #444;border-top-color:#4ea3ff;border-radius:50%;width:30px;height:30px;animation:spin .8s linear infinite;margin:0 auto 14px}@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js" defer></script>
<script type="module">import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";window.BareMux=BareMux;</script>
</head>
<body>
<div class="message" id="loading"><div class="content"><div class="spinner"></div><h2 id="title">Connecting</h2><p id="url">Initializing proxy...</p></div></div>
<div class="message" id="error" style="display:none"><div class="content"><h2>Proxy Error</h2><p id="error-text">Unable to load this site.</p></div></div>
<div id="iframe-container"></div>
<script>
const DEFAULT_WISP = "wss://glseries.net/wisp/";
const WISP_SERVERS = [{name:"GLSeries",url:"wss://glseries.net/wisp/"}];
let scramjetInstance = null;
let connectionInstance = null;

function isValidUrl(url){try{const u=new URL(url);return u.protocol==='http:'||u.protocol==='https:';}catch{return false;}}
function basePath(){return location.pathname.replace(/[^/]*$/,'') + '/';}
function getWispCandidates(){const custom=JSON.parse(localStorage.getItem('customWisps')||'[]').map((e)=>e.url||e);const configured=WISP_SERVERS.map((e)=>e.url||e);const current=localStorage.getItem('proxServer')||DEFAULT_WISP;return [...new Set([current,DEFAULT_WISP,...configured,...custom].filter(Boolean))];}

async function initializeScramjet(){if(scramjetInstance) return scramjetInstance;const { ScramjetController } = $scramjetLoadController();scramjetInstance=new ScramjetController({prefix:basePath()+"scramjet/",files:{wasm:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",all:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",sync:"https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"}});await scramjetInstance.init();return scramjetInstance;}

async function initializeConnection(){if(connectionInstance) return connectionInstance;const candidates=getWispCandidates();let lastError=null;for(const wispUrl of candidates){try{const conn=new BareMux.BareMuxConnection(basePath()+"bareworker.js");await conn.setTransport("https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs",[{wisp:wispUrl}]);connectionInstance=conn;localStorage.setItem('proxServer',wispUrl);return connectionInstance;}catch(err){lastError=err;}}throw lastError||new Error('No working wisp server found');}

async function registerServiceWorker(){if(!('serviceWorker' in navigator)) return;const registration=await navigator.serviceWorker.register(basePath()+'sw.js',{scope:basePath()});await navigator.serviceWorker.ready;const wispUrl=localStorage.getItem('proxServer')||DEFAULT_WISP;const allServers=[...WISP_SERVERS,...JSON.parse(localStorage.getItem('customWisps')||'[]')];registration.active?.postMessage({type:'config',wispurl:wispUrl,servers:allServers,autoswitch:localStorage.getItem('wispAutoswitch')!=='false'});}

async function init(){const targetUrl=window.location.hash.slice(1);if(!targetUrl||!isValidUrl(targetUrl)){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='flex';document.getElementById('error-text').textContent='Invalid URL';return;}document.getElementById('url').textContent=targetUrl;try{await registerServiceWorker();const sj=await initializeScramjet();await initializeConnection();const frame=sj.createFrame();frame.frame.id='embed-frame';document.getElementById('iframe-container').appendChild(frame.frame);frame.frame.addEventListener('load',()=>{document.getElementById('loading').style.display='none';});frame.go(targetUrl);}catch(err){document.getElementById('loading').style.display='none';document.getElementById('error').style.display='flex';document.getElementById('error-text').textContent=err?.message||'Proxy failed';}}
window.addEventListener('load',init);
</script>
</body>
</html>
